name: Deploy React to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "client/**"
      - "ListSyncer/**"
      - ".github/workflows/deploy-react.yml"
  schedule:
    - cron: '0 4 * * 1'  # Every Monday at 04:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run ListSyncer
        working-directory: ListSyncer
        run: dotnet run --configuration Release

      - name: Commit updated JSONs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add client/public/lists/
          git diff --cached --quiet || git commit -m "chore: sync lists cache [skip ci]"
          git push

  build:
    runs-on: ubuntu-latest
    needs: sync

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        run: npm run build
        env:
          VITE_API_BASE_URL: https://openvideogamedata.onrender.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
